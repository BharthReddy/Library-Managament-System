<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue / Return Book</title>

    <style>
        body{
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:450px;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            text-align:center;
            color:#2c3e50;
        }

        input,select{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#3498db;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#2980b9;
        }

        a{
            text-decoration:none;
        }

        p{
            text-align:center;
        }
    </style>

</head>
<body>

<div class="container">

<h2>Issue / Return Book</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="member" placeholder="Member Name" required>

<input type="text" name="book" placeholder="Book Name" required>

<select name="status">
    <option>Issued</option>
    <option>Returned</option>
</select>

<button type="submit">Submit</button>

</form>

<p>
<a href="/dashboard/">Back to Dashboard</a>
</p>

</div>

</body>
</html>
