<table>

<tr>
    <th>Issue ID</th>
    <th>Member Name</th>
    <th>Book Name</th>
    <th>Issue Date</th>
    <th>Return Date</th>
    <th>Status</th>
</tr>

{% for record in records %}

<tr>
    <td>{{ record.id }}</td>
    <td>{{ record.member.name }}</td>
    <td>{{ record.book.title }}</td>
    <td>{{ record.issue_date }}</td>
    <td>{{ record.return_date }}</td>
    <td>{{ record.status }}</td>
</tr>

{% endfor %}

</table>
