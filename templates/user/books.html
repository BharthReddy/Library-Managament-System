<table>

<tr>
    <th>Book Name</th>
    <th>Author</th>
    <th>Category</th>
    <th>Available</th>
    <th>Action</th>
</tr>

{% for book in books %}

<tr>
    <td>{{ book.title }}</td>
    <td>{{ book.author }}</td>
    <td>{{ book.category }}</td>
    <td>{{ book.available }}</td>

    <td>
        <button>Borrow</button>
    </td>
</tr>

{% endfor %}

</table>
