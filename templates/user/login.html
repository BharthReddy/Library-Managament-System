<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>

    <style>
        body{
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:350px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            text-align:center;
            color:#2c3e50;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#3498db;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#2980b9;
        }

        p{
            text-align:center;
        }

        a{
            text-decoration:none;
        }
    </style>

</head>

<body>

<div class="container">

<h2>User Login</h2>

<form method="POST">

    {% csrf_token %}

    <input type="text" name="username" placeholder="Enter Username" required>

    <input type="password" name="password" placeholder="Enter Password" required>

    <button type="submit">Login</button>

</form>

<p>
    Don't have an account?
    <a href="/register/">Register</a>
</p>

</div>

</body>
</html>
